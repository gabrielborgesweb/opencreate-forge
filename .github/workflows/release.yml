name: "Release"

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]

    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run quality checks
        run: npm run check

      - name: Build
        run: npm run build -- --publish never
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts-${{ matrix.os }}
          path: |
            dist/*.dmg
            dist/*.zip
            dist/*.exe
            dist/*.AppImage
            dist/*.deb
            dist/*.rpm
          if-no-files-found: error

  create-release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Get Version
        id: get_version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          TAG_NAME=${GITHUB_REF#refs/tags/}
          echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT

      - name: Prepare Release Body
        id: release_body
        run: |
          VERSION="${{ steps.get_version.outputs.version }}"
          TAG="${{ steps.get_version.outputs.tag_name }}"
          REPO="${{ github.repository }}"
          BASE_URL="https://github.com/$REPO/releases/download/$TAG"

          # electron-builder sanitization rules:
          # Windows: Spaces to dots
          # macOS: Spaces are kept (usually)
          # Linux: Spaces to hyphens

          PRODUCT_NAME="OpenCreate Forge"
          WIN_NAME=$(echo "$PRODUCT_NAME" | sed 's/ /./g')
          MAC_NAME="$PRODUCT_NAME"
          LINUX_NAME=$(echo "$PRODUCT_NAME" | sed 's/ /-/g')

          # URL encode for the table links (replacing space with %20 for macOS)
          MAC_URL_NAME=$(echo "$MAC_NAME" | sed 's/ /%20/g')

          cat <<EOF > body.md
          ## Downloads

          <table>
          <thead>
          <tr>
          <th>Platform</th>
          <th>Architecture</th>
          <th>Format</th>
          </tr>
          </thead>
          <tbody>
          <tr>
          <td rowspan="2"><strong>Windows</strong></td>
          <td rowspan="2">x64</td>
          <td><a href="$BASE_URL/$WIN_NAME.Setup.$VERSION.exe">Installer (EXE)</a></td>
          </tr>
          <tr>
          <td><a href="$BASE_URL/$WIN_NAME.$VERSION.exe">Portable (EXE)</a></td>
          </tr>
          <tr>
          <td rowspan="4"><strong>macOS</strong></td>
          <td rowspan="2">Intel (x64)</td>
          <td><a href="$BASE_URL/$MAC_URL_NAME-$VERSION.dmg">Universal/Intel (DMG)</a></td>
          </tr>
          <tr>
          <td><a href="$BASE_URL/$MAC_URL_NAME-$VERSION-mac.zip">Portable (ZIP/APP)</a></td>
          </tr>
          <tr>
          <td rowspan="2">Apple Silicon (arm64)</td>
          <td><a href="$BASE_URL/$MAC_URL_NAME-$VERSION-arm64.dmg">Download (DMG)</a></td>
          </tr>
          <tr>
          <td><a href="$BASE_URL/$MAC_URL_NAME-$VERSION-arm64-mac.zip">Portable (ZIP/APP)</a></td>
          </tr>
          <tr>
          <td rowspan="3"><strong>Linux</strong></td>
          <td rowspan="3">x64</td>
          <td><a href="$BASE_URL/$LINUX_NAME-$VERSION.AppImage">AppImage</a></td>
          </tr>
          <tr>
          <td><a href="$BASE_URL/${LINUX_NAME}_${VERSION}_amd64.deb">Debian (DEB)</a></td>
          </tr>
          <tr>
          <td><a href="$BASE_URL/$LINUX_NAME-$VERSION.x86_64.rpm">RedHat (RPM)</a></td>
          </tr>
          </tbody>
          </table>

          EOF

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: body.md
          files: artifacts/*
          draft: true
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
