<!doctype html>
<html>
  <head>
    <style>
      :root {
        --bg: #1a1a1a;
        --accent: #ff6c00;
        --text: #ffffff;
      }
      html {
        cursor: wait;
      }
      body {
        margin: 0;
        padding: 0;
        background: var(--bg);
        color: var(--text);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        overflow: hidden;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        -webkit-app-region: drag;
      }
      .container {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 4rem;
      }
      .logo-container {
        width: 96px;
        height: 96px;
      }
      .logo-svg {
        width: 100%;
        height: 100%;
        fill: var(--accent);
        /* filter: drop-shadow(0 0 15px rgba(255, 108, 0, 0.4)); */
      }
      .spinner {
        width: 28px;
        height: 28px;
        border: 2px solid rgba(255, 255, 255, 0.1);
        border-radius: 50%;
        border-top-color: rgba(255, 255, 255, 0.6);
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="logo-container">

          />
        </svg>
      </div>
      <div class="spinner"></div>
    </div>
  </body>
</html>
