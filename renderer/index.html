<!-- renderer/index.html -->
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>OpenCreate Forge</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="components.js"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'"
    />
  </head>
  <body>
    <main id="app" class="flex flex-column">
      <div id="menubar" class="flex flex-row">
        <button id="btnNew">New Project...</button>
        <button id="btnOpen">Open Image...</button>
        <button id="btnSave">Save Image...</button>
        <button id="btnGrayscale">Filter: Grayscale</button>

        <!-- mais botões de filtro / ferramenta -->
      </div>
      <div id="editor" class="flex flex-row">
        <div id="toolbar">
          <button
            class="tool-button"
            id="moveTool"
            title="Move Tool (V)"
            active
          >
            <svg-src src="assets/svg/Cursor.svg"></svg-src>
          </button>
          <button class="tool-button" id="selectTool" title="Select Tool (M)">
            <svg-src src="assets/svg/RectDashed.svg"></svg-src>
          </button>
        </div>
        <div id="canvasContainer">
          <div id="projectsTabs">
            <button disabled="disabled">Home</button>
            <!-- abas de projetos -->
          </div>
          <canvas id="mainCanvas"></canvas>
          <div id="zoomScale"></div>
        </div>
        <div id="sidebar" class="flex flex-column">
          <div id="layersPanel" class="panel">
            <h3>Layers</h3>
            <div id="layersList" class="list"></div>
            <button id="btnAddLayer">Add Layer</button>
          </div>
          <div id="propertiesPanel" class="panel">
            <h3>Properties</h3>
            <div id="propertiesContent">
              Select a layer to see its properties.
            </div>
          </div>
        </div>
      </div>
    </main>

    <dialog id="newProjectDialog">
      <form method="dialog" id="newProjectForm">
        <h2>New Project</h2>
        <label>
          Width:
          <input type="number" id="projWidth" value="800" min="1" />
        </label>
        <br />
        <label>
          Height:
          <input type="number" id="projHeight" value="600" min="1" />
        </label>
        <menu>
          <button id="cancelNew" value="cancel">Cancel</button>
          <button id="createNew" value="default">Create</button>
        </menu>
      </form>
    </dialog>

    <script src="imageEngine.js"></script>
    <script src="filters/filters.js"></script>
    <script src="app.js"></script>
  </body>
</html>
