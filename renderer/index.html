<!-- renderer/index.html -->
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- <title>Project Fg</title> -->
    <link rel="stylesheet" href="styles.css" />
    <script src="components.js"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; img-src 'self' data: blob:; style-src 'self' 'unsafe-inline'"
    />
  </head>
  <body>
    <main id="app" class="flex flex-column">
      <div id="menubar" class="flex flex-row">
        <!-- <button id="btnNew">New Project...</button> -->
        <!-- <button id="btnOpen">Open Image...</button> -->
        <!-- <button id="btnSave">Save Image...</button> -->
        <!-- <button id="btnGrayscale">Filter: Grayscale</button> -->

        <!-- mais botões de filtro / ferramenta -->
      </div>
      <div id="selectedtool"></div>
      <div id="editor" class="flex flex-row">
        <div id="toolbar">
          <button
            class="tool-button"
            id="moveTool"
            title="Move Tool (V)"
            active
          >
            <svg-src src="assets/svg/Cursor.svg"></svg-src>
          </button>
          <button class="tool-button" id="selectTool" title="Select Tool (M)">
            <svg-src src="assets/svg/RectDashed.svg"></svg-src>
          </button>
          <button class="tool-button" id="cropTool" title="Crop Tool (C)">
            <svg-src src="assets/svg/Crop.svg"></svg-src>
          </button>
          <button class="tool-button" id="brushTool" title="Brush Tool (B)">
            <svg-src src="assets/svg/Brush.svg"></svg-src>
          </button>
          <button class="tool-button" id="pencilTool" title="Pencil Tool (N)">
            <svg-src src="assets/svg/Pencil.svg"></svg-src>
          </button>
          <button class="tool-button" id="eraserTool" title="Eraser Tool (E)">
            <svg-src src="assets/svg/Eraser.svg"></svg-src>
          </button>
          <button class="tool-button" id="typeTool" title="Type Tool (T)">
            <svg-src src="assets/svg/Cursor.svg"></svg-src>
          </button>
        </div>
        <div id="canvasContainer">
          <div id="brushPreview"></div>
          <div id="projectsTabs">
            <button id="homeTab" class="active">
              <svg-src
                src="assets/svg/Home.svg"
                style="fill: #c5c5c5"
              ></svg-src>
            </button>
            <!-- abas de projetos -->
          </div>
          <div id="homeScreen">
            <div class="home-left-panel">
              <div class="home-categories">
                <!-- category tabs will be generated here -->
              </div>
              <div class="home-presets-grid">
                <!-- presets will be generated here -->
              </div>
            </div>
            <div class="home-right-panel">
              <h3>New Project</h3>
              <div class="form-group">
                <label for="home-proj-name">Name:</label>
                <input id="home-proj-name" type="text" value="Untitled" />
              </div>
              <div class="form-groups-columns">
                <div class="form-group">
                  <label for="home-proj-width">Width: (px)</label>
                  <input
                    id="home-proj-width"
                    type="number"
                    value="1080"
                    min="1"
                  />
                </div>
                <div class="form-group">
                  <label for="home-proj-height">Height: (px)</label>
                  <input
                    id="home-proj-height"
                    type="number"
                    value="1080"
                    min="1"
                  />
                </div>
              </div>
              <div class="form-group">
                <label for="home-bg-select">Background:</label>
                <div class="flex">
                  <select id="home-bg-select" style="flex: 1">
                    <option value="white" selected>White</option>
                    <option value="black">Black</option>
                    <option value="custom">Custom Color...</option>
                    <option value="none">Transparent</option>
                  </select>
                  <input
                    type="color"
                    id="home-bg-color"
                    value="#ffffff"
                    style="
                      display: none;
                      width: 28px;
                      height: 32px;
                      margin-left: 8px;
                      padding: 0;
                      border: none;
                      background: none;
                    "
                  />
                </div>
              </div>
              <button id="home-create-project">Create New Project</button>
            </div>
          </div>
          <canvas id="mainCanvas"></canvas>
          <textarea id="textEditor" spellcheck="false"></textarea>
          <div id="zoomScale" style="display: none"></div>
        </div>
        <div id="sidebar" class="flex flex-column">
          <div id="layersPanel" class="panel">
            <h3 style="margin-block-start: 0">Layers</h3>
            <div id="layersList" class="list"></div>
            <div class="layerActions">
              <button id="btnDeleteActiveLayer" title="Remover Camada">
                <svg-src src="assets/svg/Crop.svg"></svg-src>
              </button>
              <button id="btnAddEmptyLayer" title="Nova Camada">
                <svg-src src="assets/svg/Crop.svg"></svg-src>
              </button>
            </div>
            <div
              style="display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px"
            >
              <!-- <button id="btnAddEmptyLayer">+ Empty Layer</button> -->
              <button id="btnOpen">+ Image Layer</button>

              <button id="btnOpenProject">Open Project...</button>
              <button id="btnSaveProject">Save Project</button>
              <button id="btnSaveProjectAs">Save As...</button>
              <button id="btnSave">Export...</button>
            </div>
          </div>
          <div id="propertiesPanel" class="panel">
            <h3>Properties</h3>
            <div id="propertiesContent">
              Select a layer to see its properties.
            </div>
          </div>
        </div>
      </div>
    </main>

    <script type="module" src="engine.js"></script>
    <script src="filters/filters.js" defer></script>
    <script src="app.js" defer></script>
  </body>
</html>
